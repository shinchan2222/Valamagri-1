<section class="content-header">
	<div class="content-header-left">
		<h1>Edit Photo</h1>
	</div>
	<div class="content-header-right">
		<a href="#photo" class="btn btn-primary btn-sm">View All</a>
	</div>
</section>



<section class="content">

	<div class="row">
		<div class="col-md-12">

			
			<div class="callout callout-danger">
			
			<p>
			
			</p>
			</div>
			

			
			<div class="callout callout-success">
			
			<p></p>
			</div>
			

			<form class="form-horizontal" action="" method="post" enctype="multipart/form-data">
								

				<div class="box box-info">
					<div class="box-body">
						<div class="form-group">
							<label for="" class="col-sm-2 control-label">Photo Caption <span>*</span></label>
							<div class="col-sm-4">
								<input type="text" class="form-control" name="caption" value="">
							</div>
						</div>
						<div class="form-group">
				            <label for="" class="col-sm-2 control-label">Existing Photo</label>
				            <div class="col-sm-6" style="padding-top:6px;">
				                <img src="/assets/uploads/" class="existing-photo" style="width:300px;">

				                <input type="hidden" name="previous_photo" value="">
				            </div>
				        </div>
						<div class="form-group">
							<label for="" class="col-sm-2 control-label">Upload New Photo <span>*</span></label>
							<div class="col-sm-4" style="padding-top:6px;">
								<input type="file" name="photo">
							</div>
						</div>
						<div class="form-group">
							<label for="" class="col-sm-2 control-label"></label>
							<div class="col-sm-6">
								<button type="submit" class="btn btn-success pull-left" name="form1">Submit</button>
							</div>
						</div>
					</div>
				</div>
			</form>
		</div>
	</div>
</section>
